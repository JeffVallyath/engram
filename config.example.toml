# engram configuration
#
# The real config lives OUTSIDE the repo at:  %USERPROFILE%\.engram\config.toml
# It is created automatically on first run. This file is a documented example —
# never put API keys in the repo copy.

[llm]
# "anthropic" | "openai" | "manual" | "fake"
#   manual — no LLM at all: the hotkey still captures, the picker still asks what
#            you want to recall, and the approval dialog opens a type-specific
#            template you fill in yourself. engram is useful with the LLM disabled.
#   fake   — deterministic offline drafts, for trying the flow without a key.
provider = "manual"
# Used when provider = "anthropic". For "openai" a sensible default is picked too.
model = "claude-haiku-4-5"
# Name of the environment variable that holds your API key (never the key itself).
api_key_env = "ANTHROPIC_API_KEY"
# Default per-capture card budget. The popup's +/- control can adjust it per
# capture; the captured text itself can NEVER raise it (trust hierarchy).
max_cards = 2

[hotkey]
# note: ctrl+shift+a is taken by chrome (tab search), pick something free
combo = "ctrl+alt+a"
# region screenshot -> the model interprets diagrams/figures (vision).
# the screenshot is also attached to the back of the resulting cards.
snap_combo = "ctrl+alt+s"

[anki]
url = "http://127.0.0.1:8765"
deck = "engram"
tags = []
basic_model = "Basic"
basic_front_field = "Front"
basic_back_field = "Back"
cloze_model = "Cloze"
cloze_text_field = "Text"
cloze_extra_field = "Back Extra"

[capture]
clipboard_timeout_ms = 500
# Window titles can leak document names / private chat titles into Anki tags.
# Off by default; when on, the title is truncated and sanitized hard.
tag_window_title = false

[snap]
# where the screenshot ends up on snap cards:
#   "first" (default) - back of the first card only. one shared answer image
#                       would leak the answers to sibling cards reviewed in
#                       the same session; this keeps one look at the figure
#                       without spoiling the rest.
#   "all"             - back of every card
#   "none"            - text-only cards
attach_image = "first"

[cards]
front_max_chars = 200
back_max_chars = 500
cloze_max_deletions = 2

[ingest]
# Video-link ingest reads the caption track (YouTube directly; everything else
# — Canvas/Panopto/Kaltura/Echo360/Vimeo/... — via yt-dlp). Login-gated
# platforms need your session cookies. Three ways, tried in this priority order
# (first that has a cookie for the URL's domain wins):
#
#   1. Cookie bridge (recommended, and the ONLY thing that works with modern
#      Chrome). Load the companion extension in extension/ and click "Track
#      this site" on your Canvas/Panopto page. It pushes those sites' cookies
#      to the loopback port below; engram uses them automatically. Chrome
#      app-bound-encrypts + locks its cookie DB, so nothing external (yt-dlp,
#      cookies_from_browser="chrome") can read it — an in-browser extension is
#      the only path.
cookie_bridge_port = 8766          # loopback receiver for the extension; 0 = off
#
#   2. cookies_from_browser: yt-dlp reads the browser directly. Works for
#      "firefox" / "edge"; "chrome" fails on Windows (see above).
cookies_from_browser = ""
#
#   3. cookies_file: a Netscape-format cookies.txt path.
cookies_file = ""
